<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEZAAD INDUSTRIES - VLC Web Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="vlc-app-container">
        <!-- NEZAAD Logo Overlay (VLC Watermark Style) -->
        <div id="vlc-watermark">
            <h2 style="color: #ff8800; margin: 0; font-family: sans-serif; letter-spacing: 2px;">NEZAAD INDUSTRIES</h2>
        </div>

        <!-- Video Stage: Handles normal video and puzzle canvas switching -->
        <div id="video-stage">
            <video id="vlc-core-engine" crossorigin="anonymous" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4">
            </video>
            <!-- VLC Jigsaw Puzzle Video Filter Canvas -->
            <canvas id="puzzle-canvas" class="hidden"></canvas>
        </div>

        <!-- Advanced Controls Bar (View > Advanced Controls) -->
        <div id="vlc-advanced-layer">
            <button title="Take Snapshot" id="snap-btn">📸 Snapshot</button>
            <button title="VLC Jigsaw Puzzle Game" id="puzzle-trigger-btn">🧩 Puzzle Filter</button>
        </div>

        <!-- Main Controller Interface (VLC 4.0 Layout) -->
        <div id="vlc-main-controls">
            <div class="vlc-seek-section">
                <input type="range" id="vlc-seek-bar" min="0" value="0" step="0.1">
            </div>
            <div class="vlc-button-grid">
                <button id="play-pause">Play</button>
                <button id="stop-btn">Stop</button>
                <div class="vlc-spacer"></div>
                
                <!-- Convert Stream Feature Button -->
                <button id="convert-trigger" title="Convert non-MP4 via Render Engine">🔄 Convert/Stream</button>
                
                <button id="mute-btn">Mute</button>
                <input type="range" id="vlc-volume" min="0" max="1" step="0.05" value="1">
                <button id="fs-btn">Fullscreen</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
